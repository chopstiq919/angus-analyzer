<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angus Breeding Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #F8F1E9;
    --surface: #FFFFFF;
    --surface2: #F4F7F4;
    --border: #D4E0D2;
    --border2: #C8D8C5;
    --accent: #E07A5F;
    --accent-hover: #C96A52;
    --accent2: #F4A261;
    --text: #1F2C28;
    --text2: #4A5E57;
    --text3: #7A9189;
    --green: #2E8B6D;
    --green-bg: #EAF6F1;
    --red: #B85450;
    --red-bg: #FAEAEA;
    --header: #1A3C34;
    --radius: 8px;
    --shadow: 0 10px 15px -3px rgb(26 60 52 / 0.08);
    --shadow-sm: 0 2px 6px rgb(26 60 52 / 0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: auto;
    overflow-x: hidden;
    overflow-y: auto;
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  body::before { display: none; }

  /* ── HEADER ── */
  .header {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--header);
    box-shadow: 0 2px 8px rgb(0 0 0 / 0.2);
  }

  .header-eyebrow {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 2px;
  }

  .header-title {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
    font-size: 26px;
    font-weight: 900;
    color: #FFFFFF !important;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    margin-left: auto;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    letter-spacing: 0.05em;
  }

  /* ── LAYOUT ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 40px 60px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow-sm);
  }

  /* ── INPUTS ── */
  .input-row { display: flex; gap: 10px; align-items: flex-start; }
  .input-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }

  .input-label {
    font-size: 11px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.08em;
  }

  input[type="text"], input[type="password"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgb(224 122 95 / 0.12);
  }

  input::placeholder, textarea::placeholder { color: var(--text3); }
  textarea { resize: vertical; min-height: 72px; font-size: 12px; }

  /* ── BUTTONS ── */
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 600;
  }

  .btn-primary {
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    box-shadow: 0 2px 8px rgb(224 122 95 / 0.35);
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgb(224 122 95 / 0.45);
  }

  .btn-primary:active:not(:disabled) { transform: translateY(0); }

  .btn-primary:disabled {
    background: var(--border);
    color: var(--text3);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(184,84,80,0.3);
    padding: 6px 12px;
    font-size: 11px;
  }

  .btn-danger:hover { background: var(--red-bg); border-color: var(--red); }
  .btn-small { padding: 6px 14px; font-size: 11px; }

  /* ── BULL ENTRIES ── */
  .bull-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

  .bull-entry {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color 0.15s;
  }

  .bull-entry:focus-within { border-color: var(--accent); }

  .bull-number {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    width: 28px;
    flex-shrink: 0;
    text-align: center;
  }

  .bull-entry input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border2);
    border-radius: 0;
    padding: 4px 0;
    box-shadow: none;
  }

  .bull-entry input:focus {
    border-bottom-color: var(--accent);
    box-shadow: none;
  }

  /* ── RESULTS ── */
  .results-section { margin-top: 32px; }

  .results-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--border);
    flex-wrap: wrap;
  }

  .results-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  .results-cow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--header);
    background: rgba(26,60,52,0.08);
    border: 1px solid rgba(26,60,52,0.15);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* ── PARENTAGE BADGES ── */
  .parentage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .parentage-badge {
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid;
    box-shadow: var(--shadow-sm);
  }

  .parentage-badge.pass { background: var(--green-bg); border-color: var(--green); }
  .parentage-badge.fail { background: var(--red-bg); border-color: var(--red); }

  .badge-name { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .badge-status { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .pass .badge-status { color: var(--green); }
  .fail .badge-status { color: var(--red); }
  .badge-reason { font-size: 11px; color: var(--text2); line-height: 1.5; }
  .badge-flags { margin-top: 8px; }

  .flag-item {
    font-size: 11px;
    color: #7A4F1E;
    background: #FEF3E2;
    border: 1px solid #F4A261;
    border-radius: 5px;
    padding: 5px 9px;
    margin-top: 5px;
    line-height: 1.5;
  }

  /* ── EPD TABLE ── */
  .comparison-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 24px; font-size: 13px; }

  .comparison-table thead tr { background: var(--header); position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 4px rgb(0 0 0 / 0.2); }

  .comparison-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    padding: 10px 12px;
    text-align: left;
  }

  .comparison-table th.bull-col { color: var(--accent2); text-align: center; }
  .comparison-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); border-right: none; vertical-align: middle; }
  .comparison-table tr:last-child td { border-bottom: none; }
  .comparison-table tr:nth-child(even) td { background: #F8F9F7; }
  .comparison-table tr:hover td { background: rgb(224 122 95 / 0.05); }

  .trait-name { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text2); }

  .trait-group {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--header);
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 12px 6px;
    background: rgba(26,60,52,0.05);
    border-bottom: 1px solid var(--border);
  }

  .epd-cell { text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .epd-value { color: var(--text); font-weight: 500; }
  .epd-pct { font-size: 10px; }
  .epd-pct.elite { color: var(--green); font-weight: 600; }
  .epd-pct.good { color: #2E7D5E; }
  .epd-pct.poor { color: var(--red); font-weight: 600; }
  .epd-pct.avg { color: var(--text3); }
  .disqualified-col { opacity: 0.25; }

  /* ── RECOMMENDATION BOX ── */
  .recommendation-box {
    background: linear-gradient(135deg, #FFF8F5 0%, #FFF2EC 100%);
    border: 1px solid rgba(224,122,95,0.3);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }

  .rec-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .rec-value { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--accent); }
  .rec-reason { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.6; }

  /* ── $C VALUE COLORS ── */
  .expected-dc { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; }
  .dc-great { color: var(--green); }
  .dc-good { color: var(--accent); }
  .dc-ok { color: var(--text2); }

  /* ── LOADING ── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-align: center;
    max-width: 400px;
    line-height: 1.6;
  }

  /* ── ERROR ── */
  .error-box {
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 13px;
    color: var(--red);
    margin-top: 16px;
  }

  /* ── STEPS ── */
  .step-indicator {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    transition: color 0.2s;
  }

  .step.active { color: var(--accent); }
  .step.done { color: var(--green); }

  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .step.active .step-num { background: var(--accent); border-color: var(--accent); color: white; }
  .step.done .step-num { background: var(--green); border-color: var(--green); color: white; }
  .step-sep { flex: 1; height: 2px; background: var(--border); max-width: 40px; border-radius: 1px; }

  /* ── MISC ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .helper { font-size: 11px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-top: 5px; }

  .streaming-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-top: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.8;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
  }

  .midpoint-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }

  .midpoint-card {
    flex: 1;
    min-width: 150px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-sm);
  }

  .midpoint-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }

  .analysis-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .analysis-block h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .analysis-text { color: var(--text2); font-size: 14px; line-height: 1.8; }

  .cow-info-display {
    background: rgba(26,60,52,0.04);
    border: 1px solid rgba(26,60,52,0.12);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }

  .cow-info-display strong { color: var(--header); display: block; font-size: 13px; margin-bottom: 2px; }

  .context-note {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text2);
    border-radius: 0 var(--radius) var(--radius) 0;
    margin-top: 12px;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.6;
  }

  .value-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

  .value-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .value-chip:hover { border-color: var(--accent); }
  .value-chip.checked { background: rgb(224 122 95 / 0.10); border-color: var(--accent); }

  .value-chip-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }

  .value-chip.checked .value-chip-label { color: var(--accent); }
  .value-chip-desc { font-size: 10px; color: var(--text3); }
  .value-chip.checked .value-chip-desc { color: var(--accent-hover); }

  @media (max-width: 640px) {
    .header { padding: 16px 20px; }
    .header-sub { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-eyebrow">Seedstock Intelligence</div>
    <div class="header-title">Angus Breeding Analyzer</div>
  </div>
  <div class="header-sub">EPD · Parentage · $C Analysis</div>
</div>

<div class="main">

  <!-- STEP INDICATOR -->
  <div class="step-indicator">
    <div class="step active" id="step1"><div class="step-num">1</div><span>Enter Cow</span></div>
    <div class="step-sep"></div>
    <div class="step" id="step2"><div class="step-num">2</div><span>Add Bulls</span></div>
    <div class="step-sep"></div>
    <div class="step" id="step3"><div class="step-num">3</div><span>Analyze</span></div>
  </div>

  <!-- STEP 1: COW -->
  <div id="sectionCow">
    <div class="section-label">Step 1 — The Female</div>
    <div class="card">
      <div class="input-row">
        <div class="input-group">
          <div class="input-label">Cow Registration Number</div>
          <input type="text" id="cowInput" placeholder="e.g. 21193816"
            onkeydown="if(event.key==='Enter'){event.preventDefault();setCow();}" />
          <div class="helper">AAA registration number — found on the animal's papers or angus.org</div>
        </div>
        <div style="padding-top:22px;">
          <button class="btn btn-primary" onclick="setCow()">Set Cow →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 2: BULLS -->
  <div id="sectionBulls" style="display:none; margin-top:24px;">
    <div class="section-label">Step 2 — Candidate Bulls (up to 3)</div>
    <div class="card">
      <div class="bull-list" id="bullList"></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-ghost btn-small" onclick="addBull()">+ Add Another Bull</button>
        <button class="btn btn-primary" id="analyzeBtn" onclick="runAnalysis()" style="margin-left:auto;">Run Analysis →</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsSection" style="display:none;" class="results-section">
    <div class="results-header">
      <div class="results-title">Analysis Results</div>
      <div class="results-cow" id="resultsCowLabel"></div>
      <button class="btn btn-ghost btn-small" onclick="resetAll()" style="margin-left:auto;">← New Analysis</button>
    </div>
    <div id="resultsContent"></div>
  </div>

</div>

<script>
// ── STATE ──
let cowData = null;
let bulls = [{ id: 1, value: '' }, { id: 2, value: '' }];
let outputMode = 'both';
let bullIdCounter = 3;
let selectedValues = new Set(['$C']);

const VALUE_OPTIONS = [
  { key: '$C', label: '$C', desc: 'Combined Value' },
  { key: '$B', label: '$B', desc: 'Beef Value' },
  { key: '$W', label: '$W', desc: 'Weaned Calf Value' },
  { key: '$M', label: '$M', desc: 'Maternal Value' },
  { key: '$F', label: '$F', desc: 'Feedlot Value' },
  { key: '$G', label: '$G', desc: 'Grid Value' },
];

// ── VALUE CHIPS ──
function renderValueGrid() {
  document.getElementById('valueGrid').innerHTML = VALUE_OPTIONS.map(v => `
    <div class="value-chip ${selectedValues.has(v.key) ? 'checked' : ''}"
         onclick="toggleValue('${v.key}', this)">
      <div>
        <div class="value-chip-label">${v.label}</div>
        <div class="value-chip-desc">${v.desc}</div>
      </div>
    </div>
  `).join('');
}

function toggleValue(key, el) {
  if (selectedValues.has(key)) {
    if (selectedValues.size <= 1) return; // always keep at least one
    selectedValues.delete(key);
    el.classList.remove('checked');
  } else {
    selectedValues.add(key);
    el.classList.add('checked');
  }
}

function setCow() {
  const val = document.getElementById('cowInput').value.trim();
  if (!val) return;
  cowData = { input: val, notes: '' };
  document.getElementById('sectionBulls').style.display = 'block';
  document.getElementById('step1').className = 'step done';
  document.getElementById('step2').className = 'step active';
  renderBullList();
  scrollTo('sectionBulls');
}

// ── STEP 2 ──
function renderBullList() {
  document.getElementById('bullList').innerHTML = bulls.map((b, i) => `
    <div class="bull-entry">
      <div class="bull-number">${i + 1}</div>
      <input type="text"
        id="bull-input-${b.id}"
        placeholder="AAA registration number"
        value="${b.value}"
        oninput="updateBull(${b.id}, this.value)"
        onkeydown="handleBullEnter(event, ${i})"
      />
      ${bulls.length > 1 ? `<button class="btn btn-danger" onclick="removeBull(${b.id})">✕</button>` : ''}
    </div>`).join('');
}

function handleBullEnter(event, index) {
  if (event.key !== 'Enter') return;
  event.preventDefault();
  runAnalysis();
}

function addBull() {
  if (bulls.length >= 3) return;
  bulls.push({ id: bullIdCounter++, value: '' });
  renderBullList();
}

function removeBull(id) {
  if (bulls.length <= 1) return;
  bulls = bulls.filter(b => b.id !== id);
  renderBullList();
}

function updateBull(id, val) {
  const b = bulls.find(b => b.id === id);
  if (b) b.value = val;
}

// ── STEP 3 ──
function setMode(mode, btn) {
  outputMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── STEP 4: ANALYSIS ──
async function runAnalysis() {
  const filledBulls = bulls.filter(b => b.value.trim());
  if (!cowData || filledBulls.length === 0) return;

  document.getElementById('step2').className = 'step done';
  document.getElementById('step3').className = 'step active';
  document.getElementById('analyzeBtn').disabled = true;

  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('resultsCowLabel').textContent = cowData.input;
  document.getElementById('resultsContent').innerHTML = `
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <div class="loading-status" id="loadingStatus">
        Connecting to angus.org...<br>
        <span style="font-size:10px;margin-top:4px;display:block;">This takes 20–40 seconds</span>
      </div>
    </div>`;

  scrollTo('resultsSection');

  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cow: cowData.input,
        cowNotes: cowData.notes,
        bulls: filledBulls.map(b => b.value),
        outputMode,
        priorityValues: Array.from(selectedValues)
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error || `Server error ${response.status}`);
    }

    // Read SSE stream
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const event = JSON.parse(line.slice(6));

          if (event.type === 'status') {
            const statusEl = document.getElementById('loadingStatus');
            if (statusEl) statusEl.innerHTML = event.message + '<br><span style="font-size:10px;margin-top:4px;display:block;">This takes 20–40 seconds</span>';
          }

          if (event.type === 'text') {
            fullText += event.text;
          }

          if (event.type === 'done') {
            if (event.parsed) {
              renderWithData(event.parsed);
            } else {
              renderResults(event.fullText || fullText);
            }
          }

          if (event.type === 'error') {
            throw new Error(event.message);
          }
        } catch(e) {
          if (e.message && !e.message.includes('JSON')) throw e;
        }
      }
    }

  } catch (err) {
    document.getElementById('resultsContent').innerHTML = `
      <div class="error-box">
        <strong>Error:</strong> ${err.message}<br>
        <span style="font-size:11px;margin-top:4px;display:block;">Check that the server is running and your API key is configured.</span>
      </div>`;
  }

  document.getElementById('analyzeBtn').disabled = false;
}


// ── RENDER RESULTS ──
function renderResultsFromData(jsonData) {
  if (!jsonData) {
    document.getElementById('resultsContent').innerHTML =
      `<div class="error-box">Could not parse results. Please try again.</div>`;
    return;
  }
  renderWithData(jsonData);
}

function renderResults(rawText) {
  let jsonData = null;
  const jsonMatch = rawText.match(/```json\s*([\s\S]*?)\s*```/);
  if (jsonMatch) {
    try { jsonData = JSON.parse(jsonMatch[1]); } catch(e) {}
  }
  if (!jsonData) {
    const start = rawText.indexOf('{"cow"');
    const end = rawText.lastIndexOf('}');
    if (start !== -1 && end > start) {
      try { jsonData = JSON.parse(rawText.slice(start, end + 1)); } catch(e) {}
    }
  }
  if (!jsonData) {
    const start = rawText.indexOf('{');
    const end = rawText.lastIndexOf('}');
    if (start !== -1 && end > start) {
      try { jsonData = JSON.parse(rawText.slice(start, end + 1)); } catch(e) {}
    }
  }
  if (!jsonData) {
    document.getElementById('resultsContent').innerHTML =
      `<div class="error-box">Could not parse results. Please try again.</div>`;
    return;
  }
  renderWithData(jsonData);
}

function renderWithData(jsonData) {
  let html = '';
  const bulls = jsonData.bulls || [];
  const eligible = bulls.filter(b => b.parentageResult === 'PASS');

  // ── SECTION 1: Expected Calf $Values per eligible bull ──
  if (eligible.length > 0) {
    eligible.forEach(bull => {
      const mid = bull.expectedMidpointC;
      const cls = mid >= 470 ? 'dc-great' : mid >= 450 ? 'dc-good' : 'dc-ok';
      const flags = bull.flags || [];
      const cowE = jsonData.cow?.epds || {};
      const be = bull.epds || {};

      // Build selected $Value midpoints
      const valueKeys = ['$C','$B','$W','$M','$F','$G'];
      const selectedArr = Array.from(selectedValues);
      const valueRows = selectedArr
        .filter(v => valueKeys.includes(v))
        .map(v => {
          const cowVal = cowE[v];
          const bullVal = be[v];
          const cowPct = cowE[`${v.slice(1)}_pct`] || cowE[`${v}_pct`];
          const bullPct = be[`${v.slice(1)}_pct`] || be[`${v}_pct`];
          // Map $C->C_pct, $B->B_pct etc
          const cpKey = v === '$C' ? '$C_pct' : v === '$B' ? '$B_pct' : v === '$W' ? '$W_pct' : v === '$M' ? '$M_pct' : v === '$F' ? '$F_pct' : '$G_pct';
          const cp = cowE[cpKey];
          const bp = be[cpKey];
          if (cowVal == null || bullVal == null) return null;
          const midVal = Math.round(((Number(cowVal) + Number(bullVal)) / 2) * 10) / 10;
          const midPct = cp != null && bp != null ? Math.round((cp + bp) / 2) : null;
          const isPrimary = v === '$C';
          return { v, midVal, midPct, isPrimary };
        })
        .filter(Boolean);

      html += `
        <div class="recommendation-box" style="margin-bottom:16px;">
          <div class="rec-label">Expected Calf Values — ${bull.name}</div>
          <div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:${flags.length ? '12px' : '0'};">
            ${valueRows.map(r => `
              <div>
                <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold-dim);letter-spacing:0.1em;margin-bottom:2px;">${r.v}</div>
                <div class="expected-dc ${r.isPrimary ? cls : 'dc-ok'}" style="font-size:${r.isPrimary ? '36px' : '22px'};font-weight:700;font-family:'Playfair Display',serif;">~$${r.midVal}</div>
                ${r.midPct != null ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);">${r.midPct}th percentile</div>` : ''}
              </div>`).join('')}
          </div>
          ${flags.length > 0
            ? `<div style="display:flex;flex-direction:column;gap:6px;">${flags.map(f => `<div class="flag-item">${f}</div>`).join('')}</div>`
            : `<div style="font-size:12px;color:var(--green);font-family:'IBM Plex Mono',monospace;">✓ No concerns flagged</div>`}
        </div>`;
    });
  } else {
    html += `
      <div class="recommendation-box" style="background:var(--red-bg);border-color:var(--red);">
        <div class="rec-label" style="color:var(--red);">No Eligible Bulls</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px;">All candidate bulls were disqualified on parentage grounds.</div>
      </div>`;
  }

  // ── SECTION 2: Parentage Compatibility ──
  html += `<div class="section-label" style="margin-top:8px;">Parentage Compatibility</div>`;
  html += `<div class="parentage-grid">`;
  bulls.forEach(bull => {
    const pass = bull.parentageResult === 'PASS';
    html += `
      <div class="parentage-badge ${pass ? 'pass' : 'fail'}">
        <div class="badge-name">${bull.name || 'Unknown'}</div>
        <div class="badge-status" style="font-size:15px;margin:4px 0;">${pass ? '✅ Pass' : '❌ Disqualified'}</div>
        ${!pass && bull.parentageReason ? `<div class="badge-reason">${bull.parentageReason}</div>` : ''}
      </div>`;
  });
  html += `</div>`;

  // ── SECTION 3: Expected Calf EPD Table ──
  if (eligible.length > 0) {
    const traitGroups = [
      { group: '$Values', items: [
        { key: '$C', label: '$C', pctKey: '$C_pct' },
        { key: '$B', label: '$B', pctKey: '$B_pct' },
        { key: '$W', label: '$W', pctKey: '$W_pct' },
        { key: '$M', label: '$M', pctKey: '$M_pct' },
        { key: '$F', label: '$F', pctKey: '$F_pct' },
        { key: '$G', label: '$G', pctKey: '$G_pct' },
      ]},
      { group: 'Production', items: [
        { key: 'CED', label: 'CED', pctKey: 'CED_pct' },
        { key: 'BW', label: 'BW', pctKey: 'BW_pct' },
        { key: 'WW', label: 'WW', pctKey: 'WW_pct' },
        { key: 'YW', label: 'YW', pctKey: 'YW_pct' },
        { key: 'RADG', label: 'RADG', pctKey: 'RADG_pct' },
        { key: 'DMI', label: 'DMI', pctKey: 'DMI_pct' },
        { key: 'YH', label: 'YH', pctKey: 'YH_pct' },
        { key: 'SC', label: 'SC', pctKey: 'SC_pct' },
      ]},
      { group: 'Maternal', items: [
        { key: 'HP', label: 'HP', pctKey: 'HP_pct' },
        { key: 'CEM', label: 'CEM', pctKey: 'CEM_pct' },
        { key: 'Milk', label: 'Milk', pctKey: 'Milk_pct' },
        { key: 'MKH', label: 'MKH', pctKey: 'MKH_pct' },
        { key: 'Teat', label: 'Teat', pctKey: 'Teat_pct' },
        { key: 'UDDR', label: 'UDDR', pctKey: 'UDDR_pct' },
        { key: 'FL', label: 'FL', pctKey: 'FL_pct' },
        { key: 'MW', label: 'MW', pctKey: 'MW_pct' },
        { key: 'MH', label: 'MH', pctKey: 'MH_pct' },
        { key: 'EN', label: '$EN', pctKey: 'EN_pct' },
      ]},
      { group: 'Management', items: [
        { key: 'Doc_pct', label: 'Doc %', pctKey: null },
        { key: 'Claw_pct', label: 'Claw %', pctKey: null },
        { key: 'Angle_pct', label: 'Angle %', pctKey: null },
        { key: 'PAP_pct', label: 'PAP %', pctKey: null },
        { key: 'HS_pct', label: 'HS %', pctKey: null },
      ]},
      { group: 'Carcass', items: [
        { key: 'CW', label: 'CW', pctKey: 'CW_pct' },
        { key: 'Marb', label: 'Marb', pctKey: 'Marb_pct' },
        { key: 'RE', label: 'RE', pctKey: 'RE_pct' },
        { key: 'Fat', label: 'Fat', pctKey: 'Fat_pct' },
      ]},
      { group: 'Angus-on-Dairy', items: [
        { key: 'AxH', label: '$AxH', pctKey: 'AxH_pct' },
        { key: 'AxJ', label: '$AxJ', pctKey: 'AxJ_pct' },
      ]},
    ];
    const showCalfCol = eligible.length === 1;
    const colCount = 2 + eligible.length + (showCalfCol ? 1 : 0);

    html += `<div class="section-label" style="margin-top:8px;">Expected Calf EPDs</div>`;
    html += `<table class="comparison-table"><thead><tr>
      <th>Trait</th>
      <th class="bull-col" style="word-break:break-word;max-width:120px;">${jsonData.cow?.name || 'Cow'}</th>
      ${eligible.map(b => `<th class="bull-col">${b.name || 'Bull'}</th>`).join('')}
      ${showCalfCol ? `<th class="bull-col" style="color:var(--accent2);">Expected Calf</th>` : ''}
    </tr></thead><tbody>`;

    traitGroups.forEach(g => {
      html += `<tr><td colspan="${colCount}" class="trait-group">${g.group}</td></tr>`;
      g.items.forEach(trait => {
        html += `<tr><td class="trait-name">${trait.label}</td>`;

        const cowE = jsonData.cow?.epds || {};
        const cv = cowE[trait.key];
        const cp = trait.pctKey ? cowE[trait.pctKey] : (trait.key.endsWith('_pct') ? cv : null);
        html += `<td class="epd-cell">
          <div class="epd-value">${cv !== undefined && cv !== null ? cv : '—'}</div>
          ${cp != null ? `<div class="epd-pct ${pctClass(cp)}">${cp}%</div>` : ''}
        </td>`;

        eligible.forEach(bull => {
          const be = bull.epds || {};
          const bv = be[trait.key];
          const bp = trait.pctKey ? be[trait.pctKey] : (trait.key.endsWith('_pct') ? bv : null);
          html += `<td class="epd-cell">
            <div class="epd-value">${bv !== undefined && bv !== null ? bv : '—'}</div>
            ${bp != null ? `<div class="epd-pct ${pctClass(bp)}">${bp}%</div>` : ''}
          </td>`;

          if (showCalfCol) {
            const cavg = cv != null && bv != null ? Math.round(((Number(cv) + Number(bv)) / 2) * 100) / 100 : null;
            const capct = cp != null && bp != null ? Math.round((cp + bp) / 2) : null;
            const flagged = capct != null && capct >= 90;
            html += `<td class="epd-cell" style="${flagged ? 'background:rgba(255,180,0,0.08);' : ''}">
              <div class="epd-value" style="${flagged ? 'color:#9a6e28;font-weight:600;' : ''}">${cavg !== null ? cavg : '—'}</div>
              ${capct != null ? `<div class="epd-pct ${pctClass(capct)}">${capct}%${flagged ? ' ⚠️' : ''}</div>` : ''}
            </td>`;
          }
        });
        html += `</tr>`;
      });
    });
    html += `</tbody></table>`;
  }

  document.getElementById('resultsContent').innerHTML =
    html || `<div class="error-box">No results to display. Please try again.</div>`;

  // Save to session so back button doesn't lose results
  try {
    sessionStorage.setItem('lastResult', JSON.stringify({
      jsonData,
      cowLabel: jsonData.cow?.name || cowData?.input || ''
    }));
  } catch(e) {}
}

// ── HELPERS ──
function pctClass(p) {
  if (p <= 5) return 'elite';
  if (p <= 20) return 'good';
  if (p >= 70) return 'poor';
  return 'avg';
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatAnalysis(text) {
  return escapeHtml(text)
    // H2 headers -> styled divs
    .replace(/^## (.+)$/gm, '<div class="analysis-h2">$1</div>')
    // H3 headers
    .replace(/^### (.+)$/gm, '<div class="analysis-h3">$1</div>')
    // Bold
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    // Bullet points
    .replace(/^- (.+)$/gm, '<div class="analysis-bullet">$1</div>')
    // Paragraphs
    .replace(/\n\n/g, '</p><p class="analysis-p">')
    .replace(/\n/g, '<br>');
}

function scrollTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  // Try scrollIntoView first — works better across different scroll contexts
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetAll() {
  try { sessionStorage.removeItem('lastResult'); } catch(e) {}
  cowData = null;
  bulls = [{ id: 1, value: '' }, { id: 2, value: '' }];
  bullIdCounter = 3;
  selectedValues = new Set(['$C']);

  ['cowInput'].forEach(id => document.getElementById(id).value = '');
  ['sectionBulls','resultsSection'].forEach(id =>
    document.getElementById(id).style.display = 'none');

  document.getElementById('step1').className = 'step active';
  ['step2','step3'].forEach(id => document.getElementById(id).className = 'step');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── INIT ──
renderBullList();

// Restore last result if user hit back button
try {
  const saved = sessionStorage.getItem('lastResult');
  if (saved) {
    const { jsonData, cowLabel } = JSON.parse(saved);
    if (jsonData) {
      document.getElementById('resultsSection').style.display = 'block';
      document.getElementById('resultsCowLabel').textContent = cowLabel || '';
      renderWithData(jsonData);
      document.getElementById('step1').className = 'step done';
      document.getElementById('step2').className = 'step done';
      document.getElementById('step3').className = 'step active';
    }
  }
} catch(e) {}
</script>
